<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <title>Register Teacher</title>
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <h2 class="mb-4">Register Teacher</h2>
            <form method="POST">
                <!--Form name-->
                <div class="mb-3">
                    <label>Full Name</label>
                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required>
                </div>
                <!--Form email-->
                <div class="mb-3">
                    <label>Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>
                </div>
                <!--Form pass-->
                <div class="mb-3">
                    <label>Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>
                </div>
                <!--Form assigned-class-->
                <div class="mb-3">
                    <label>Assigned Class</label>
                    <input
                        type="text"
                        name="assigned_class"
                        class="form-control"
                        placeholder="Example: 10A"
                        required>
                </div>
                <button class="btn btn-primary">
                    Register Teacher!
                </button>
            </form>
        </div>
    </div>
</body>
</html>
